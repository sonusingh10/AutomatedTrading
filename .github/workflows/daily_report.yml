name: Daily Risk Report

on:
  schedule:
    - cron: '0 14 * * 1-5' # Runs at 9:00 AM EST, Monday to Friday
  workflow_dispatch: # Allows manual triggering

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Risk Report
        run: python daily_risk_report.py

      - name: Commit and Push Report
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add daily_risk_report.csv
          git commit -m "Automated Daily Risk Report: $(date +'%Y-%m-%d')" || exit 0
          git push
